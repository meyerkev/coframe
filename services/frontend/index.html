<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coframe Performance</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Coframe Performance</h1>
        <p>Site health and page performance</p>
      </div>
      <form id="site-form" class="site-form">
        <label for="site-id">Site</label>
        <input id="site-id" name="site-id" value="demo" />
        <button type="submit">Refresh</button>
      </form>
    </header>

    <section class="summary-strip">
      <div class="summary-card">
        <span class="summary-label">Redis queue</span>
        <strong id="queue-count" class="summary-value">0</strong>
        <span id="queue-name" class="summary-meta">page-events</span>
      </div>
    </section>

    <main class="layout">
      <section class="panel top-pages-panel">
        <h2>Top Pages</h2>
        <table>
          <thead>
            <tr>
              <th>Page</th>
              <th>Events</th>
              <th>p75 LCP</th>
              <th>Last seen</th>
            </tr>
          </thead>
          <tbody id="pages"></tbody>
        </table>
      </section>

      <section class="panel trend-panel">
        <div class="panel-header">
          <h2>LCP Trend</h2>
          <div class="chart-controls">
            <div class="control-group" aria-label="Bucket size">
              <span>Bucket</span>
              <button type="button" data-bucket="15">15s</button>
              <button type="button" data-bucket="30">30s</button>
              <button type="button" data-bucket="60" class="active">1m</button>
              <button type="button" data-bucket="300">5m</button>
              <button type="button" data-bucket="600">10m</button>
              <button type="button" data-bucket="1200">20m</button>
              <button type="button" data-bucket="1800">30m</button>
              <button type="button" data-bucket="3600">60m</button>
            </div>
            <div class="control-group" aria-label="Chart range">
              <span>Range</span>
              <button type="button" data-range="10">10m</button>
              <button type="button" data-range="30" class="active">30m</button>
              <button type="button" data-range="60">60m</button>
            </div>
          </div>
        </div>
        <div id="trend" class="trend-chart"></div>
      </section>

      <section class="panel">
        <h2>Experiment Latency</h2>
        <table>
          <thead>
            <tr>
              <th>Experiment</th>
              <th>Events</th>
              <th>p75 LCP</th>
              <th>Last seen</th>
            </tr>
          </thead>
          <tbody id="experiments"></tbody>
        </table>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
