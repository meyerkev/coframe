name: coframe-platform

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - app

services:
  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coframe
      POSTGRES_PASSWORD: coframe
      POSTGRES_DB: coframe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coframe -d coframe"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    <<: *service-defaults
    build:
      context: ./services/api
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://coframe:coframe@postgres:5432/coframe
      EVENT_QUEUE: page-events
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 3

  worker:
    <<: *service-defaults
    build:
      context: ./services/worker
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://coframe:coframe@postgres:5432/coframe
      EVENT_QUEUE: page-events
    ports:
      - "9101:9101"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    <<: *service-defaults
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./services/frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_started

  redis:
    <<: *service-defaults
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./platform/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started

networks:
  app:

volumes:
  pgdata:
  redis-data:
  prometheus-data:
